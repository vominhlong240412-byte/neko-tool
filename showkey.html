<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Key Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#10b981;font-family:monospace;}</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div id="box" class="hidden border border-emerald-500 p-10 rounded-3xl text-center bg-zinc-950">
        <h2 class="text-sm font-bold mb-6 italic uppercase">Nhiệm vụ hoàn tất</h2>
        <div id="key" class="text-3xl font-black bg-black p-6 rounded-2xl border border-emerald-800 mb-4 text-emerald-400 select-all">...</div>
        <p class="text-[9px] opacity-50 uppercase">Thời hạn: 24 Giờ</p>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const app = initializeApp({ databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" });
        const db = getDatabase(app);

        const p = new URLSearchParams(window.location.search);
        if(p.get('status') === 'success') {
            document.getElementById('box').classList.remove('hidden');
            window.history.replaceState({}, '', window.location.pathname);
            const k = 'NEKO-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            set(ref(db, `Keys/${k}`), { status: "active", expiry: "24h" }).then(() => {
                document.getElementById('key').innerText = k;
            });
        } else { window.location.href = 'laykey.html'; }
    </script>
</body>
</html>
