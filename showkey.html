<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Your Key</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-black text-emerald-500 font-mono flex items-center justify-center min-h-screen">
    <div id="box" class="hidden border border-emerald-500 p-10 rounded-3xl text-center">
        <h2 class="text-xs italic mb-4">SUCCESS! KEY CỦA BẠN:</h2>
        <div id="key" class="text-3xl font-black bg-zinc-900 p-6 rounded-2xl border border-emerald-800 mb-6 select-all">...</div>
        <button onclick="window.location.href='index.html'" class="text-[10px] underline uppercase">Về trang chủ</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const db = getDatabase(initializeApp({databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/"}));
        if(new URLSearchParams(window.location.search).get('status') === 'success') {
            document.getElementById('box').classList.remove('hidden');
            const k = 'NEKO-' + Math.random().toString(36).substring(2, 9).toUpperCase();
            const exp = new Date(Date.now() + 86400000).toLocaleDateString('vi-VN');
            set(ref(db, `Keys/${k}`), { status: "active", expiry: exp, hwid: "" }).then(()=>document.getElementById('key').innerText = k);
        } else { window.location.href = 'laykey.html'; }
    </script>
</body>
</html>
