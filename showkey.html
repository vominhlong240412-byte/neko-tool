<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Secure Key Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#10b981;font-family:monospace;}</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 text-center">
    <div id="box" class="hidden border-2 border-emerald-500 p-10 rounded-3xl max-w-sm w-full bg-slate-950">
        <h2 class="text-white text-sm font-bold mb-6 italic">XÁC MINH HOÀN TẤT</h2>
        <div id="key" class="bg-black border border-emerald-900 p-5 rounded-2xl text-2xl font-black text-emerald-400 mb-6 select-all tracking-widest">ĐANG TẠO...</div>
        <button onclick="window.location.href='index.html'" class="text-[10px] underline uppercase opacity-50">Quay lại trang chủ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const config = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(config);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'success') {
            document.getElementById('box').classList.remove('hidden');
            window.history.replaceState({}, '', window.location.pathname); // Xóa URL dò tìm
            
            const newKey = 'NEKO-' + Math.random().toString(36).substring(2, 11).toUpperCase();
            set(ref(db, `Keys/${newKey}`), { status: "active", expiry: "24h" }).then(() => {
                document.getElementById('key').innerText = newKey;
            });
        } else { window.location.href = 'laykey.html'; }
    </script>
</body>
</html>
