<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Get Key - Neko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#10b981;font-family:monospace;}</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="border border-emerald-500 p-10 rounded-3xl text-center max-w-sm w-full">
        <h2 class="text-2xl font-black mb-6 uppercase italic">Hệ thống Key</h2>
        
        <div id="step-1">
            <p class="text-xs mb-6 opacity-60">Bấm vào nút dưới, vượt link để kích hoạt hệ thống đếm ngược.</p>
            <button onclick="startMission()" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black uppercase">Đi tới link nhiệm vụ</button>
        </div>

        <div id="step-2" class="hidden">
            <p class="text-xs mb-4 uppercase tracking-widest">Đang xác minh... Vui lòng đợi</p>
            <div id="timer" class="text-5xl font-black text-white my-6">10</div>
            <p class="text-[10px] opacity-40">Vui lòng không đóng trang này</p>
        </div>

        <div id="step-3" class="hidden">
            <p class="text-xs mb-2">KEY CỦA BẠN LÀ:</p>
            <div id="final-key" class="bg-emerald-900/30 p-4 rounded-xl text-xl font-bold text-white border border-emerald-500 mb-4 select-all">NEKO-PRO-99</div>
            <button onclick="window.location.href='index.html'" class="text-xs underline">Quay lại trang chủ</button>
        </div>
    </div>

    <script>
        function startMission() {
            window.open('https://link4m.com/gyI4XF', '_blank');
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            
            let count = 10;
            const t = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = count;
                if (count <= 0) {
                    clearInterval(t);
                    document.getElementById('step-2').classList.add('hidden');
                    document.getElementById('step-3').classList.remove('hidden');
                }
            }, 1000);
        }
    </script>
</body>
</html>
