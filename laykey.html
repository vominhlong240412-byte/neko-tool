<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Neko Cloud - Terminal Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #10b981; font-family: 'JetBrains Mono', monospace; }
        .terminal-box { border: 1px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="terminal-box bg-black p-10 rounded-2xl w-full max-w-md">
        <div class="text-xs mb-6 opacity-50 uppercase tracking-widest">Auth_Protocol_v2.0</div>
        <h2 class="text-3xl font-black mb-8 text-white uppercase italic">Nhập Key</h2>
        <input type="text" id="key-in" placeholder="PASSKEY..." class="w-full bg-slate-950 border-b-2 border-emerald-900 p-4 rounded-t-xl outline-none focus:border-emerald-500 text-center text-xl font-bold uppercase tracking-widest">
        <button onclick="verify()" class="w-full bg-emerald-500 text-black py-4 mt-6 font-black rounded-xl hover:bg-white transition-all uppercase">Verify Access</button>
        <p id="msg" class="mt-4 text-xs font-bold uppercase text-center"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.verify = async () => {
            const val = document.getElementById('key-in').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Checking...";
            
            const snapshot = await get(ref(db, `Keys/${val}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                localStorage.setItem('neko_auth', JSON.stringify(data));
                msg.innerText = "GRANTED! Redirecting...";
                msg.style.color = "#10b981";
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                msg.innerText = "Access Denied: Key Incorrect";
                msg.style.color = "#ef4444";
            }
        };
    </script>
</body>
</html>
