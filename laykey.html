<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GET LICENSE | NEKO CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #bc13fe; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        .box { background: #050505; border: 1px solid #1a1a1a; padding: 50px; width: 400px; text-align: center; }
        .btn-gen { width: 100%; padding: 20px; background: #bc13fe; color: #000; font-weight: 900; letter-spacing: 2px; margin-top: 30px; cursor: pointer; border: none; }
        .btn-gen:hover { transform: scale(1.05); box-shadow: 0 0 30px #bc13fe; }
    </style>
</head>
<body>
    <div class="box">
        <h1 class="text-3xl font-black italic mb-4">GET <span class="text-white">KEY</span></h1>
        <p class="text-[10px] opacity-40 uppercase tracking-widest">Hệ thống cấp mã tự động</p>
        <button id="gen-btn" onclick="goLink()" class="btn-gen">TẠO KEY MỚI NGAY</button>
        <p class="mt-6 text-[9px] opacity-20 italic">Vui lòng hoàn thành vượt link Link4M để nhận key</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const firebaseConfig = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        window.goLink = async () => {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "ĐANG KHỞI TẠO..."; btn.disabled = true;

            const snap = await get(ref(db, 'ModLinks/Current'));
            const link = snap.exists() ? snap.val() : "https://link4m.co/default";

            // Tạo Token Anti-Buff
            sessionStorage.setItem('bypass_token', 'NEKO_VERIFIED_' + Date.now());
            setTimeout(() => { window.location.href = link; }, 1000);
        };
    </script>
</body>
</html>
