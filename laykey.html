<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#10b981;font-family:monospace;}</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="border border-emerald-500 p-10 rounded-3xl text-center max-w-sm w-full">
        <h2 class="text-xl font-black mb-6 uppercase tracking-tighter">Hệ thống Key</h2>
        <div id="step-1">
            <p class="text-[10px] mb-8 opacity-50">VƯỢT LINK ĐỂ KÍCH HOẠT HỆ THỐNG TẠO KEY TỰ ĐỘNG.</p>
            <button onclick="start()" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black uppercase hover:bg-white transition-all">BẮT ĐẦU VƯỢT LINK</button>
        </div>
        <div id="step-2" class="hidden">
            <p class="text-[10px] mb-4 uppercase">Đang đồng bộ dữ liệu nhiệm vụ...</p>
            <div id="timer" class="text-6xl font-black text-white my-6">10</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const config = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(config);
        const db = getDatabase(app);

        window.start = async () => {
            const snap = await get(ref(db, 'Config/MissionLink'));
            if(snap.exists()){
                window.open(snap.val(), '_blank');
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                let count = 10;
                const t = setInterval(() => {
                    count--;
                    document.getElementById('timer').innerText = count;
                    if(count <= 0) { clearInterval(t); location.reload(); }
                }, 1000);
            }
        }
    </script>
</body>
</html>
