<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Mission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#10b981;font-family:monospace;}</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="border border-emerald-500 p-10 rounded-3xl text-center">
        <h2 class="text-xl font-black mb-6 uppercase">Key System</h2>
        <button onclick="start()" class="bg-emerald-500 text-black px-10 py-4 rounded-xl font-bold uppercase">Bắt đầu nhiệm vụ</button>
        <div id="t" class="text-5xl font-black mt-6 hidden">10</div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const db = getDatabase(initializeApp({databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/"}));
        window.start = async () => {
            const s = await get(ref(db, 'Config/MissionLink'));
            if(s.exists()){ 
                window.open(s.val(), '_blank');
                document.getElementById('t').classList.remove('hidden');
                let c = 10;
                setInterval(() => { c--; document.getElementById('t').innerText = c; if(c<=0) location.reload(); }, 1000);
            }
        };
    </script>
</body>
</html>
