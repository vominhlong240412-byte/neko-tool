<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NEKO ADMIN - SERVER CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #bc13fe; font-family: monospace; }
        .cyber-box { border: 1px solid #bc13fe; background: #050505; padding: 30px; margin: 20px; box-shadow: 0 0 20px rgba(188,19,254,0.1); }
        th, td { border: 1px solid #1a1a1a; padding: 15px; text-align: left; }
        th { background: #bc13fe; color: #000; font-family: 'Orbitron'; font-size: 10px; }
        .status-on { color: #00ff41; } .status-off { color: #ff003c; }
        input { background: #000; border: 1px solid #222; color: #fff; padding: 10px; outline: none; margin-bottom: 10px; width: 100%; }
        button { border: 1px solid #bc13fe; padding: 10px 20px; transition: 0.3s; }
        button:hover { background: #bc13fe; color: #000; }
    </style>
</head>
<body>
    <div class="cyber-box">
        <h1 class="text-4xl font-black italic mb-2">NEKO_ADMIN_SERVER</h1>
        <p class="text-[10px] opacity-50 mb-10 uppercase tracking-[5px]">Global User & Key Management Terminal</p>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div>
                <h2 class="text-xl font-bold mb-4">LICENSE_KEY_PROVISION</h2>
                <input type="text" id="k-name" placeholder="New Key Name">
                <input type="text" id="k-exp" placeholder="Expiry Date (DD/MM/YYYY)" value="31/12/2026">
                <button onclick="addKey()" class="w-full">GENERATE_KEY</button>
            </div>
            <div>
                <h2 class="text-xl font-bold mb-4">MODERATOR_OVERRIDE</h2>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="m-name" placeholder="Mod Name (Thuan/Loc/Neko/King)">
                    <input type="text" id="m-url" placeholder="Mod URL">
                </div>
                <button onclick="setMod()" class="w-full">UPDATE_MOD_STREAM</button>
            </div>
        </div>

        <div class="mt-20">
            <h2 class="text-xl font-bold mb-6">USER_STORAGE_DATABASE</h2>
            <table class="w-full">
                <thead>
                    <tr>
                        <th>OPERATOR_ID</th>
                        <th>CIPHER</th>
                        <th>VERIFIED</th>
                        <th>STATUS</th>
                        <th>REG_DATE</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="user-list"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const fb = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(fb);
        const db = getDatabase(app);

        // LOAD USERS
        onValue(ref(db, 'Users'), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = ""; if(!snap.val()) return;
            Object.keys(snap.val()).forEach(u => {
                const info = snap.val()[u];
                list.innerHTML += `
                    <tr>
                        <td class="text-white font-bold">${u}</td>
                        <td>${info.pass}</td>
                        <td class="${info.verified ? 'status-on' : 'status-off'}">${info.verified}</td>
                        <td class="${info.banned ? 'status-off' : 'status-on'}">${info.banned ? 'BANNED' : 'ACTIVE'}</td>
                        <td class="text-[10px] opacity-40">${info.reg_date || 'N/A'}</td>
                        <td>
                            <button onclick="updateUser('${u}', 'verified', ${!info.verified})" class="text-[9px]">TOGGLE_V</button>
                            <button onclick="updateUser('${u}', 'banned', ${!info.banned})" class="text-[9px]">TOGGLE_B</button>
                            <button onclick="delUser('${u}')" class="text-[9px] text-red-500">DELETE</button>
                        </td>
                    </tr>
                `;
            });
        });

        window.addKey = async () => {
            const k = document.getElementById('k-name').value.trim();
            const ex = document.getElementById('k-exp').value.trim();
            if(!k) return;
            await set(ref(db, `Keys/${k}`), { status: "active", expiry: ex, hwid: "" });
            alert("KEY_GENERATED: " + k);
        };

        window.setMod = async () => {
            const n = document.getElementById('m-name').value.trim();
            const u = document.getElementById('m-url').value.trim();
            if(!n || !u) return;
            await update(ref(db, `ModLinks`), { [n]: u });
            alert("MOD_STREAM_UPDATED");
        };

        window.updateUser = (u, field, val) => {
            update(ref(db, `Users/${u}`), { [field]: val });
        };

        window.delUser = (u) => {
            if(confirm("Xóa Operator " + u + "?")) remove(ref(db, `Users/${u}`));
        };
    </script>
</body>
</html>
