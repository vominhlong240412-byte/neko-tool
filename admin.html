<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>Neko Root Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#000;color:#10b981;font-family:monospace;}</style>
</head>
<body class="p-4 md:p-10 max-w-6xl mx-auto text-xs">
    <h1 class="text-2xl font-black mb-8 border-b border-zinc-900 pb-4">ROOT CONTROL</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="bg-zinc-900 p-4 rounded-xl border border-emerald-900">
            <h2 class="font-bold mb-4">Cài đặt Link Vượt (Link4m)</h2>
            <input type="text" id="l4m" class="bg-black p-2 rounded border border-emerald-800 w-full mb-3 outline-none">
            <button onclick="upL()" class="w-full bg-emerald-500 text-black py-2 font-bold">LƯU LINK4M</button>
        </div>
        <div class="bg-zinc-900 p-4 rounded-xl border border-blue-900">
            <h2 class="font-bold mb-4 text-blue-400 italic">⭐ SPECIAL: GETKEY YSM</h2>
            <p class="mb-2 opacity-60">https://ysmteam.io.vn/keys/free?admin=YSMTEAM</p>
            <button onclick="window.open('https://ysmteam.io.vn/keys/free?admin=YSMTEAM')" class="w-full bg-blue-600 text-white py-2">MỞ TRANG YSM</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-zinc-900 p-4 rounded-xl">
            <h2 class="font-bold mb-3">Tạo Key Manual</h2>
            <input type="text" id="k-id" placeholder="Tên Key" class="bg-black border border-zinc-800 p-2 w-full mb-2">
            <input type="text" id="k-exp" placeholder="Hạn (dd/mm/yyyy)" class="bg-black border border-zinc-800 p-2 w-full mb-2">
            <button onclick="genK()" class="w-full bg-white text-black py-2 font-bold">TẠO</button>
        </div>
        <div class="bg-zinc-900 p-4 rounded-xl">
            <h2 class="font-bold mb-3 text-red-500">Ban User</h2>
            <input type="text" id="u-ban" placeholder="Username" class="bg-black border border-zinc-800 p-2 w-full mb-2">
            <button onclick="ban(true)" class="w-full bg-red-600 text-white py-2">BAN</button>
        </div>
        <div class="bg-zinc-900 p-4 rounded-xl border border-blue-800">
            <h2 class="font-bold mb-3 text-blue-400">Xác thực Email (Mail System)</h2>
            <div id="mail-list" class="space-y-2 h-[100px] overflow-auto"></div>
        </div>
    </div>

    <h2 class="font-bold mb-4 uppercase">Danh sách Link trên Web</h2>
    <div id="all-links" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" }));

        window.upL = () => set(ref(db, 'Config/MissionLink'), document.getElementById('l4m').value);
        window.genK = () => set(ref(db, `Keys/${document.getElementById('k-id').value}`), { status: "active", expiry: document.getElementById('k-exp').value, hwid: "" });
        window.ban = (st) => update(ref(db, `Users/${document.getElementById('u-ban').value}`), { banned: st });

        // Xóa link
        onValue(ref(db, 'SharedLinks'), (s) => {
            const box = document.getElementById('all-links'); box.innerHTML = "";
            const data = s.val(); if(!data) return;
            Object.keys(data).forEach(id => {
                box.innerHTML += `<div class="bg-zinc-950 p-3 rounded border border-zinc-800">
                    <p class="text-[9px] mb-2 truncate">${data[id].url}</p>
                    <button onclick="remove(ref(db, 'SharedLinks/${id}'))" class="text-red-500 font-bold uppercase">XÓA LINK</button>
                </div>`;
            });
        });

        // Duyệt OTP
        onValue(ref(db, 'MailConfirm'), (s) => {
            const list = document.getElementById('mail-list'); list.innerHTML = "";
            const data = s.val(); if(!data) return;
            Object.keys(data).forEach(u => {
                list.innerHTML += `<div class="bg-black p-2 border border-blue-900 flex justify-between">
                    <span>${u} - OTP: <b class="text-white">${data[u].otp}</b></span>
                    <button onclick="remove(ref(db, 'MailConfirm/${u}'))" class="text-blue-400">X</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
