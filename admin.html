<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ROOT TERMINAL - NEKO ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; }
        .card { background: #0a0a0a; border: 1px solid #1f2937; padding: 20px; border-radius: 12px; }
        .inp { background: #000; border: 1px solid #333; color: #00ff41; padding: 12px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 10px; font-size: 11px; }
        .btn { font-weight: 800; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; }
    </style>
</head>
<body class="p-8 max-w-[1500px] mx-auto">
    <h1 class="text-3xl font-black italic mb-8 border-b border-zinc-800 pb-4">NEKO <span class="text-white">ROOT_ADMIN</span></h1>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
        <div class="card border-blue-500/30">
            <h2 class="text-blue-400 font-bold mb-4 text-[10px]">⚡ KEY GENERATOR</h2>
            <input type="text" id="k-name" placeholder="Tên gợi nhớ" class="inp">
            <select id="k-days" class="inp">
                <option value="1">1 Ngày</option><option value="7">7 Ngày</option><option value="30">30 Ngày</option>
            </select>
            <button onclick="smartGenKey()" class="btn bg-blue-600 text-white hover:bg-blue-500">Generate</button>
            <div id="result-key" class="mt-4 p-2 bg-black border border-dashed border-blue-500 text-center font-bold text-white text-[10px]">---</div>
        </div>

        <div class="card border-red-500/30">
            <h2 class="text-red-500 font-bold mb-4 text-[10px]">👤 USER MODERATOR</h2>
            <input type="text" id="u-ban" placeholder="Username..." class="inp">
            <div class="flex gap-2">
                <button onclick="setBan(true)" class="btn bg-red-600 text-white">BAN</button>
                <button onclick="setBan(false)" class="btn bg-zinc-800 text-white">UNBAN</button>
            </div>
        </div>

        <div class="card border-cyan-500/30">
            <h2 class="text-cyan-400 font-bold mb-4 text-[10px]">🔗 MODERATOR LINK UPLOADER</h2>
            <select id="mod-select" class="inp">
                <option value="Thuan">Thuận Mod</option>
                <option value="Loc">Lộc Mod</option>
                <option value="Neko">NEKO</option>
                <option value="King">KING OF CHEAT</option>
            </select>
            <input type="text" id="mod-link-val" placeholder="Dán link getkey tại đây..." class="inp">
            <button onclick="upModLink()" class="btn bg-cyan-600 text-black">Cập nhật Link</button>
            <p class="text-[8px] opacity-40 mt-2 italic">*Link sẽ hiện nút "Bấm vào đây" ở menu 3 gạch.</p>
        </div>

        <div class="card border-emerald-500/30">
            <h2 class="text-emerald-500 font-bold mb-4 text-[10px]">📩 PENDING OTP</h2>
            <div id="mail-list" class="space-y-2 h-[150px] overflow-y-auto pr-1"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="card"><h2 class="font-bold mb-4 text-neon text-[10px] border-b border-zinc-800">KEYS DATABASE (HWID RESET)</h2><div id="key-list" class="h-[400px] overflow-y-auto space-y-2"></div></div>
        <div class="card"><h2 class="font-bold mb-4 text-white text-[10px] border-b border-zinc-800">GLOBAL LINKS (404 CLEANER ACTIVE)</h2><div id="link-list" class="h-[400px] overflow-y-auto space-y-2"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        const db = getDatabase(initializeApp({databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/"}));

        // UP LINK MOD
        window.upModLink = () => {
            const mod = document.getElementById('mod-select').value;
            const link = document.getElementById('mod-link-val').value;
            if(!link) return alert("Vui lòng dán link!");
            update(ref(db, 'ModLinks'), { [mod]: link }).then(() => {
                alert(`Đã cập nhật link cho ${mod}`);
                document.getElementById('mod-link-val').value = "";
            });
        };

        window.smartGenKey = async () => {
            const name = document.getElementById('k-name').value, days = parseInt(document.getElementById('k-days').value);
            if(!name) return;
            const finalKey = `${name}_${Math.random().toString(36).substring(2, 7).toUpperCase()}`;
            const exp = new Date(); exp.setDate(exp.getDate() + days);
            await set(ref(db, `Keys/${finalKey}`), { status: "active", expiry: exp.toLocaleDateString('vi-VN'), hwid: "" });
            document.getElementById('result-key').innerText = finalKey;
        };

        window.deleteItem = (path) => { if(confirm("Xóa vĩnh viễn?")) remove(ref(db, path)); };
        window.resetHWID = (id) => update(ref(db, `Keys/${id}`), { hwid: "" }).then(() => alert("Reset Xong!"));
        window.setBan = (st) => update(ref(db, `Users/${document.getElementById('u-ban').value}`), { banned: st }).then(()=>alert("Thực thi xong!"));

        onValue(ref(db, 'Keys'), (s) => {
            const l = document.getElementById('key-list'), d = s.val(); l.innerHTML = ""; if(!d) return;
            Object.keys(d).forEach(k => {
                l.innerHTML += `<div class="p-3 bg-black border border-zinc-800 flex justify-between items-center text-[10px]">
                    <span>${k} (${d[k].expiry}) HWID: ${d[k].hwid ? 'LOCKED' : 'OPEN'}</span>
                    <div class="flex gap-2"><button onclick="resetHWID('${k}')" class="text-cyan-400">RESET</button><button onclick="deleteItem('Keys/${k}')" class="text-red-500">X</button></div>
                </div>`;
            });
        });

        onValue(ref(db, 'SharedLinks'), (s) => {
            const l = document.getElementById('link-list'), d = s.val(); l.innerHTML = ""; if(!d) return;
            Object.keys(d).forEach(id => {
                l.innerHTML += `<div class="p-3 bg-black border border-zinc-800 flex justify-between items-center text-[10px]"><span class="truncate w-3/4">${d[id].url}</span><button onclick="deleteItem('SharedLinks/${id}')" class="text-red-500">GỠ</button></div>`;
            });
        });

        onValue(ref(db, 'MailConfirm'), (s) => {
            const mList = document.getElementById('mail-list'), d = s.val(); mList.innerHTML = ""; if(!d) return;
            Object.keys(d).forEach(u => {
                mList.innerHTML += `<div class="bg-emerald-950/20 p-2 border border-emerald-900 rounded relative text-[10px]">
                    <p>User: ${u} | Email: ${d[u].email}</p><p class="text-white font-black">OTP: ${d[u].otp}</p>
                    <button onclick="remove(ref(db, 'MailConfirm/${u}'))" class="absolute top-2 right-2 text-red-500">X</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
