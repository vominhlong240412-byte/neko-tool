<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPREME ADMIN | NEKO SYSTEM V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #bc13fe; --p-glow: rgba(188, 19, 254, 0.3); --bg: #020202; }
        body { background: var(--bg); color: var(--p); font-family: 'Be Vietnam Pro', sans-serif; min-height: 100vh; padding: 40px; }
        
        /* Giao diện khung sườn */
        .cyber-card { background: rgba(5, 5, 5, 0.8); border: 1px solid #1a1a1a; position: relative; overflow: hidden; transition: 0.4s; }
        .cyber-card:hover { border-color: var(--p); box-shadow: 0 0 40px var(--p-glow); }
        .cyber-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--p), transparent); animation: scan 3s linear infinite; }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

        /* Input & Button Styles */
        .admin-input { width: 100%; background: #000; border: 1px solid #1a1a1a; padding: 14px; color: #fff; font-family: 'JetBrains Mono'; font-size: 12px; outline: none; margin-bottom: 12px; border-radius: 4px; }
        .admin-input:focus { border-color: var(--p); box-shadow: inset 0 0 10px var(--p-glow); }
        .btn-supreme { width: 100%; padding: 15px; background: var(--p); color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border: none; clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%); transition: 0.3s; }
        .btn-supreme:hover { background: #fff; filter: drop-shadow(0 0 15px #fff); }

        /* Table Design */
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #0d0d0d; color: var(--p); padding: 18px; text-align: left; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--p); }
        td { padding: 18px; border-bottom: 1px solid #111; color: #999; vertical-align: middle; }
        tr:hover { background: rgba(188, 19, 254, 0.05); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--p); }
    </style>
</head>
<body>

    <header class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="cyber-card p-6 border-l-4 border-l-purple-600">
            <p class="text-[10px] opacity-50 uppercase font-black">Tổng User</p>
            <h2 id="total-users" class="text-3xl font-black text-white mt-2">0</h2>
        </div>
        <div class="cyber-card p-6 border-l-4 border-l-blue-600">
            <p class="text-[10px] opacity-50 uppercase font-black">Key Hoạt Động</p>
            <h2 id="total-keys" class="text-3xl font-black text-white mt-2">0</h2>
        </div>
        <div class="cyber-card p-6 border-l-4 border-l-green-600">
            <p class="text-[10px] opacity-50 uppercase font-black">Chờ Duyệt Mail</p>
            <h2 id="pending-mails" class="text-3xl font-black text-white mt-2">0</h2>
        </div>
        <div class="cyber-card p-6 border-l-4 border-l-red-600">
            <p class="text-[10px] opacity-50 uppercase font-black">Server Latency</p>
            <h2 class="text-3xl font-black text-green-500 mt-2">12ms</h2>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <div class="lg:col-span-4 space-y-8">
            <section class="cyber-card p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-p"></div>
                    <h3 class="text-sm font-black uppercase text-white italic">Cấu hình Link Vượt</h3>
                </div>
                <label class="text-[9px] opacity-40 uppercase mb-2 block">Dán link Link4M/Lootlabs</label>
                <input type="text" id="admin-link-input" class="admin-input" placeholder="https://link4m.co/...">
                <button onclick="saveLink()" class="btn-supreme">Cập Nhật Link Hệ Thống</button>
            </section>

            <section class="cyber-card p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-p"></div>
                    <h3 class="text-sm font-black uppercase text-white italic">Phát hành Key Mới</h3>
                </div>
                <input type="text" id="k-name" class="admin-input" placeholder="Tên Key (VD: PRO_WEEK_1)">
                <input type="text" id="k-exp" class="admin-input" placeholder="Hạn dùng (30/12/2026)">
                <button onclick="addKey()" class="btn-supreme">Xác Nhận Phát Hành</button>
            </section>

            <section class="cyber-card p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-p"></div>
                    <h3 class="text-sm font-black uppercase text-white italic">Thông báo Index</h3>
                </div>
                <textarea id="sys-msg" class="admin-input h-24" placeholder="Nội dung thông báo chạy chữ trên Index..."></textarea>
                <button onclick="setNotice()" class="btn-supreme">Đăng Thông Báo</button>
            </section>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <section class="cyber-card p-8">
                <h3 class="text-xs font-black uppercase text-white italic mb-6">Danh sách User & Quản lý xác minh</h3>
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email Request</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-body"></tbody>
                    </table>
                </div>
            </section>

            <section class="cyber-card p-8">
                <h3 class="text-xs font-black uppercase text-white italic mb-6">Kho Key Đã Phát Hành</h3>
                <div id="key-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // REAL-TIME: USERS & MAILS
        onValue(ref(db, 'Users'), s => {
            const b = document.getElementById('user-body');
            const data = s.val() || {};
            let pending = 0;
            b.innerHTML = "";
            document.getElementById('total-users').innerText = Object.keys(data).length;

            Object.keys(data).forEach(id => {
                const u = data[id];
                if(!u.verified && u.email_request) pending++;
                b.innerHTML += `
                    <tr>
                        <td class="text-white font-bold font-mono">${id}</td>
                        <td class="text-[10px] italic">${u.email_request || 'None'}</td>
                        <td>
                            <span class="${u.verified?'text-green-500':'text-yellow-600'} font-black uppercase">
                                [${u.verified ? 'Verified' : 'Pending'}]
                            </span>
                        </td>
                        <td class="flex gap-4">
                            ${!u.verified ? `<button onclick="vUser('${id}')" class="text-white hover:text-p font-black">APPROVE</button>` : ''}
                            <button onclick="ban('${id}', ${!u.banned})" class="text-red-500 font-black">${u.banned?'UNBAN':'BAN'}</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('pending-mails').innerText = pending;
        });

        // REAL-TIME: KEYS
        onValue(ref(db, 'Keys'), s => {
            const grid = document.getElementById('key-grid');
            const data = s.val() || {};
            grid.innerHTML = "";
            document.getElementById('total-keys').innerText = Object.keys(data).length;

            Object.keys(data).forEach(k => {
                grid.innerHTML += `
                    <div class="bg-black border border-zinc-900 p-4 flex justify-between items-center group">
                        <div>
                            <p class="text-white font-bold text-[11px]">${k}</p>
                            <p class="text-[9px] opacity-30 tracking-widest">${data[k].expiry}</p>
                        </div>
                        <button onclick="delKey('${k}')" class="text-red-600 opacity-0 group-hover:opacity-100 transition-all font-black">X</button>
                    </div>
                `;
            });
        });

        // ACTIONS
        window.saveLink = () => set(ref(db, 'ModLinks/Current'), document.getElementById('admin-link-input').value).then(()=>alert('Updated!'));
        window.addKey = () => set(ref(db, `Keys/${document.getElementById('k-name').value}`), { expiry: document.getElementById('k-exp').value }).then(()=>alert('Key Generated!'));
        window.setNotice = () => set(ref(db, 'SystemNotice'), { msg: document.getElementById('sys-msg').value }).then(()=>alert('Notice Live!'));
        window.vUser = (id) => update(ref(db, `Users/${id}`), { verified: true });
        window.ban = (id, st) => update(ref(db, `Users/${id}`), { banned: st });
        window.delKey = (k) => confirm('Xóa Key này?') && remove(ref(db, `Keys/${k}`));
    </script>
</body>
</html>
