<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #10b981; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-10 text-emerald-500">HỆ THỐNG QUẢN TRỊ</h1>
        
        <div class="bg-zinc-900 p-6 rounded-2xl mb-10 border border-emerald-900">
            <h2 class="font-bold mb-4">TẠO KEY TRUY CẬP</h2>
            <div class="flex gap-4">
                <input type="text" id="k-name" placeholder="Tên Key..." class="bg-black p-3 rounded-xl flex-1 outline-none border border-emerald-900">
                <input type="text" id="k-exp" placeholder="Hạn dùng (vd: 30 ngày)" class="bg-black p-3 rounded-xl flex-1 outline-none border border-emerald-900">
                <button onclick="genKey()" class="bg-emerald-500 text-black px-6 rounded-xl font-bold">LƯU</button>
            </div>
            <p id="adm-msg" class="text-[10px] mt-2 font-bold uppercase"></p>
        </div>

        <h2 class="font-bold mb-4 text-white">DANH SÁCH FILE - QUẢN LÝ</h2>
        <div id="admin-link-list" class="space-y-2"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.genKey = () => {
            const k = document.getElementById('k-name').value;
            const e = document.getElementById('k-exp').value;
            if(!k || !e) return;
            set(ref(db, `Keys/${k}`), { expiry: e });
            document.getElementById('adm-msg').innerText = "Đã tạo key mới thành công!";
        };

        onValue(ref(db, 'SharedLinks'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('admin-link-list');
            list.innerHTML = "";
            if(!data) return;

            Object.keys(data).forEach(id => {
                const item = data[id];
                list.innerHTML += `
                    <div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-emerald-950">
                        <span class="text-sm">${item.name} (${item.domain})</span>
                        <button onclick="delLink('${id}')" class="text-red-500 font-bold hover:bg-red-500 hover:text-white px-4 py-1 rounded-lg transition-all">XÓA</button>
                    </div>
                `;
            });
        });

        window.delLink = (id) => {
            if(confirm("Bạn có chắc chắn muốn xóa file này không?")) {
                remove(ref(db, `SharedLinks/${id}`));
            }
        };
    </script>
</body>
</html>
