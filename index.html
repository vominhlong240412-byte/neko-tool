<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Neko Node - System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #10b981; font-family: 'JetBrains Mono', monospace; }
        .matrix-card { background: rgba(15, 23, 42, 0.95); border: 1px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        .input-hacker { background: #000; border: 1px solid #064e3b; color: #10b981; padding: 12px; border-radius: 12px; outline: none; width: 100%; margin-bottom: 15px; }
        .input-hacker:focus { border-color: #10b981; }
        .hidden { display: none; }
        .btn-logout { border: 1px solid #ef4444; color: #ef4444; padding: 5px 15px; border-radius: 8px; font-size: 10px; font-bold; transition: 0.3s; }
        .btn-logout:hover { background: #ef4444; color: #000; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="auth-screen" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-6">
        <div class="matrix-card p-8 rounded-3xl w-full max-w-md">
            <div id="auth-title" class="text-2xl font-black mb-8 text-center uppercase italic text-white">Login <span class="text-emerald-500">System</span></div>
            
            <input type="text" id="u-user" placeholder="USERNAME" class="input-hacker">
            <input type="password" id="u-pass" placeholder="PASSWORD" class="input-hacker">
            <input type="text" id="u-key" placeholder="ACCESS KEY" class="input-hacker">

            <button id="btn-main" onclick="handleAuth()" class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl hover:bg-white transition-all uppercase mb-4">Đăng Nhập</button>
            
            <div class="flex justify-between text-[10px] uppercase font-bold px-2">
                <span onclick="toggleAuth()" class="cursor-pointer hover:text-white" id="auth-switch">Chưa có tài khoản? Đăng ký</span>
                <a href="laykey.html" class="text-emerald-700 underline">Lấy Key tại đây</a>
            </div>
            <p id="auth-msg" class="mt-4 text-center text-[10px] font-bold uppercase"></p>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic text-emerald-500 uppercase">Neko <span class="text-white">Node</span></h1>
                <button onclick="logout()" class="btn-logout mt-2 uppercase font-black">Đăng xuất</button>
            </div>
            <button onclick="document.getElementById('upload-form').classList.toggle('hidden')" class="bg-white text-black px-6 py-2 rounded-xl font-bold">ĐĂNG LINK</button>
        </div>

        <input type="text" id="search" oninput="loadData()" placeholder="TÌM KIẾM FILE..." class="input-hacker mb-10">

        <div id="upload-form" class="hidden matrix-card p-6 rounded-2xl mb-10 border-dashed border-emerald-500">
            <input type="text" id="f-url" placeholder="Dán link của bạn vào đây..." class="input-hacker">
            <button onclick="postLink()" class="w-full bg-emerald-500 text-black font-black py-3 rounded-xl">UP NGAY</button>
            <p id="up-msg" class="text-[10px] mt-3 font-bold text-center"></p>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const config = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(config);
        const db = getDatabase(app);

        let isLoginMode = true;

        // Hàm Đăng xuất
        window.logout = () => {
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            // Xóa trắng input khi thoát
            document.getElementById('u-user').value = "";
            document.getElementById('u-pass').value = "";
            document.getElementById('u-key').value = "";
            document.getElementById('auth-msg').innerText = "Đã đăng xuất!";
            document.getElementById('auth-msg').className = "mt-4 text-center text-[10px] font-bold uppercase text-white";
        };

        window.toggleAuth = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login System" : "Register System";
            document.getElementById('btn-main').innerText = isLoginMode ? "Đăng Nhập" : "Đăng Ký";
            document.getElementById('auth-switch').innerText = isLoginMode ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
        };

        window.handleAuth = async () => {
            const user = document.getElementById('u-user').value;
            const pass = document.getElementById('u-pass').value;
            const key = document.getElementById('u-key').value;
            const msg = document.getElementById('auth-msg');

            if(!user || !pass || !key) { msg.innerText = "Điền đủ thông tin!"; return; }

            if(isLoginMode) {
                const userSnap = await get(ref(db, `Users/${user}`));
                const keySnap = await get(ref(db, `Keys/${key}`));

                if(!userSnap.exists() || userSnap.val().pass !== pass) {
                    msg.innerText = "Sai tài khoản hoặc mật khẩu!"; msg.className="text-red-500";
                } else if(!keySnap.exists()) {
                    msg.innerText = "Key không tồn tại!"; msg.className="text-red-500";
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    loadData();
                }
            } else {
                await set(ref(db, `Users/${user}`), { pass: pass });
                msg.innerText = "Đăng ký xong! Hãy đăng nhập."; msg.className="text-emerald-500 font-bold";
                toggleAuth();
            }
        };

        window.postLink = async () => {
            const url = document.getElementById('f-url').value;
            if(!url) return;
            const banned = ["link4m", "layma.net", "funlink"];
            if(banned.some(b => url.includes(b))) { 
                document.getElementById('up-msg').innerText = "PHÁT HIỆN LINK RÁC!";
                document.getElementById('up-msg').className = "text-[10px] mt-3 font-bold text-center text-red-500";
                return; 
            }

            await push(ref(db, 'SharedLinks'), { url, views: 0, clicks: 0, time: Date.now() });
            document.getElementById('f-url').value = "";
            document.getElementById('up-msg').innerText = "UP THÀNH CÔNG!";
            document.getElementById('up-msg').className = "text-[10px] mt-3 font-bold text-center text-emerald-500";
            setTimeout(() => { document.getElementById('upload-form').classList.add('hidden'); }, 1500);
        };

        window.loadData = () => {
            const term = document.getElementById('search').value.toLowerCase();
            onValue(ref(db, 'SharedLinks'), (snap) => {
                const list = document.getElementById('list'); list.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    if(item.url.toLowerCase().includes(term)) {
                        list.innerHTML += `
                            <div class="matrix-card p-6 rounded-2xl flex flex-col">
                                <p class="text-[10px] break-all mb-4 opacity-60 text-white">${item.url}</p>
                                <div class="flex justify-between items-center mt-auto">
                                    <span class="text-[9px] opacity-40 uppercase">${item.clicks} Clicks</span>
                                    <button onclick="go('${id}','${item.url}')" class="bg-emerald-950 border border-emerald-500 px-4 py-2 rounded-lg font-bold text-xs hover:bg-emerald-500 hover:text-black transition-all">MỞ LINK</button>
                                </div>
                            </div>`;
                    }
                });
            });
        };

        window.go = async (id, url) => {
            await update(ref(db, `SharedLinks/${id}`), { clicks: increment(1) });
            window.open(url, '_blank');
        };
    </script>
</body>
</html>
