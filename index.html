<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko Cloud - Share Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #eee; font-family: 'Segoe UI', sans-serif; }
        .cyber-panel { background: #111; border: 1px solid #222; }
        .link-card { background: #161616; border-left: 4px solid #7c3aed; transition: 0.3s; }
        .link-card:hover { background: #1c1c1c; transform: translateX(5px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic text-purple-500 tracking-tighter">NEKO <span class="text-white">CLOUD</span></h1>
            <div class="flex gap-2">
                 <button onclick="window.location.href='admin.html'" class="bg-zinc-800 text-white px-4 py-2 rounded-full font-bold text-sm">ADMIN</button>
                 <button onclick="toggleUpload()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-full font-bold transition-all">
                    <i class="fa-solid fa-plus mr-2"></i> ĐĂNG FILE
                </button>
            </div>
        </div>

        <div id="upload-form" class="hidden cyber-panel rounded-3xl p-6 mb-10 border-purple-900/30 border">
            <h2 class="text-xl font-bold mb-4 text-purple-400">Tải lên File/Link mới</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="file-name" placeholder="Tên file..." class="bg-zinc-900 border border-zinc-800 p-3 rounded-xl outline-none focus:border-purple-600">
                <input type="text" id="file-url" placeholder="Dán URL..." class="bg-zinc-900 border border-zinc-800 p-3 rounded-xl outline-none focus:border-purple-600">
            </div>
            <button onclick="uploadLink()" class="w-full mt-4 bg-white text-black font-black py-3 rounded-xl hover:bg-purple-500 hover:text-white transition-all">XÁC NHẬN</button>
        </div>

        <div class="space-y-4" id="link-container">
            <p class="text-center text-zinc-600">Đang tải dữ liệu từ Cloud...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.toggleUpload = () => document.getElementById('upload-form').classList.toggle('hidden');

        window.uploadLink = async () => {
            const name = document.getElementById('file-name').value;
            const url = document.getElementById('file-url').value;
            if (!name || !url) return alert("Thiếu thông tin!");

            await push(ref(db, 'SharedLinks'), {
                name, url, views: 0, clicks: 0, timestamp: Date.now()
            });
            document.getElementById('file-name').value = "";
            document.getElementById('file-url').value = "";
            toggleUpload();
        };

        const container = document.getElementById('link-container');
        onValue(ref(db, 'SharedLinks'), (snapshot) => {
            const data = snapshot.val();
            container.innerHTML = "";
            if (!data) return container.innerHTML = "<div class='text-center py-20 opacity-20'>TRỐNG</div>";

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                const card = document.createElement('div');
                card.className = "link-card p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4";
                card.innerHTML = `
                    <div class="flex-1">
                        <h3 class="font-bold text-lg text-white mb-1">${item.name}</h3>
                        <div class="flex gap-4 text-[10px] text-zinc-500 font-bold">
                            <span><i class="fa-solid fa-eye text-purple-500"></i> ${item.views || 0} VIEW</span>
                            <span><i class="fa-solid fa-mouse-pointer text-purple-500"></i> ${item.clicks || 0} CLICK</span>
                        </div>
                    </div>
                    <button onclick="handleAction('${id}', '${item.url}')" class="bg-purple-600 hover:bg-white hover:text-black text-white px-8 py-2 rounded-xl font-bold transition-all">
                        TẢI XUỐNG
                    </button>
                `;
                container.appendChild(card);
            });
        });

        // HÀM QUAN TRỌNG: Chỉ tăng view khi thực sự click vào nút Tải xuống
        window.handleAction = async (id, url) => {
            // Tăng cả view và click cùng lúc khi người dùng tương tác
            await update(ref(db, `SharedLinks/${id}`), { 
                clicks: increment(1),
                views: increment(1) 
            });
            window.open(url, '_blank');
        };
    </script>
</body>
</html>
