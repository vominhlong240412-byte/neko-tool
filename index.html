<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko System - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; overflow: hidden; }
        .cyber-card { background: #111; border: 1px solid #222; box-shadow: 0 0 50px rgba(124, 58, 237, 0.1); }
        .input-focus:focus { border-color: #7c3aed; box-shadow: 0 0 15px rgba(124, 58, 237, 0.3); outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm cyber-card rounded-[2rem] p-8 text-center relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-600/10 rounded-full blur-3xl"></div>
        
        <h1 class="text-3xl font-black mb-2 italic text-white">NEKO <span class="text-purple-600">HUB</span></h1>
        <p class="text-[10px] text-zinc-600 uppercase tracking-[5px] mb-8">Authentication Required</p>

        <div class="space-y-4">
            <div class="text-left">
                <label class="text-[10px] font-bold text-zinc-500 ml-2 uppercase">Vui lòng nhập Key:</label>
                <input type="text" id="input-key" placeholder="NEKO_XXXXX" 
                    class="w-full bg-black border border-zinc-800 p-4 rounded-2xl mt-1 input-focus text-purple-400 font-mono font-bold transition-all text-center">
            </div>

            <button onclick="checkKey()" id="btn-login" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg shadow-purple-900/20">
                ĐĂNG NHẬP
            </button>

            <div class="pt-4">
                <p class="text-xs text-zinc-500">Chưa có mã? 
                    <a href="laykey.html" class="text-purple-500 font-bold hover:underline">Lấy Key tại đây</a>
                </p>
            </div>
        </div>

        <p class="mt-8 text-[9px] text-zinc-800 font-bold uppercase tracking-widest">© 2026 Neko Security</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Sử dụng link Asia chuẩn của bạn
        const firebaseConfig = { 
            databaseURL: "https://keysytem-4af25-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.checkKey = async function() {
            const inputKey = document.getElementById('input-key').value.trim();
            const btn = document.getElementById('btn-login');

            if (!inputKey) {
                alert("Bạn chưa nhập Key!");
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> ĐANG KIỂM TRA...';
            btn.disabled = true;

            try {
                // Tìm Key trong nhánh ActiveKeys trên Firebase
                const snapshot = await get(ref(db, 'ActiveKeys/' + inputKey));
                
                if (snapshot.exists()) {
                    btn.innerHTML = 'HỢP LỆ! ĐANG VÀO...';
                    btn.style.background = "#22c55e"; // Đổi sang màu xanh lá
                    
                    // Sau 1 giây sẽ chuyển hướng vào giao diện chính của Tool
                    setTimeout(() => {
                        alert("Đăng nhập thành công!");
                        // Bạn thay 'main.html' bằng tên file giao diện chính của bạn nhé
                        // window.location.href = 'main.html'; 
                    }, 1000);
                } else {
                    alert("Key không tồn tại hoặc đã hết hạn!");
                    btn.innerHTML = 'ĐĂNG NHẬP';
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Lỗi kết nối: " + e.message);
                btn.innerHTML = 'ĐĂNG NHẬP';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
